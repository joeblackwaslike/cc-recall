# claude-mem-watchdog configuration — sourced by bin/*.sh
# Override any value by editing here; all are plain shell assignments.

# --- Paths -------------------------------------------------------------------
CLAUDE_MEM_DIR="${CLAUDE_MEM_DIR:-$HOME/.claude-mem}"
CLAUDE_MEM_DB="${CLAUDE_MEM_DB:-$CLAUDE_MEM_DIR/claude-mem.db}"
CLAUDE_MEM_SETTINGS="${CLAUDE_MEM_SETTINGS:-$CLAUDE_MEM_DIR/settings.json}"
PLUGIN_GLOB="${PLUGIN_GLOB:-$HOME/.claude/plugins/cache/thedotmack/claude-mem}"

# State dir (shared rendezvous with the OpenClaw decision bridge)
STATE_DIR="${STATE_DIR:-$HOME/.claude-mem-watchdog}"

# Tool absolute paths (launchd has a minimal PATH; resolve explicitly)
SQLITE3="${SQLITE3:-$(command -v sqlite3 || echo /usr/bin/sqlite3)}"
# Resolve from PATH so it tracks the active install (avoids homebrew/nvm version skew).
OPENCLAW="${OPENCLAW:-$(command -v openclaw 2>/dev/null || echo /opt/homebrew/bin/openclaw)}"
NODE_BIN="${NODE_BIN:-node}"

# Candidate `claude` binaries, in preference order, for CLAUDE_CODE_PATH repair
CLAUDE_CANDIDATES=(
  "/opt/homebrew/bin/claude"
  "$HOME/.volta/bin/claude"
)

# --- Worker ------------------------------------------------------------------
WORKER_HOST="${WORKER_HOST:-127.0.0.1}"
WORKER_PORT="${WORKER_PORT:-37777}"
WORKER_HEALTH_TIMEOUT_SECS="${WORKER_HEALTH_TIMEOUT_SECS:-5}"
WORKER_RESTART_SETTLE_SECS="${WORKER_RESTART_SETTLE_SECS:-6}"
WORKER_RESTART_AFTER_PATCH_SECS="${WORKER_RESTART_AFTER_PATCH_SECS:-2}"

# --- Thresholds (audit) ------------------------------------------------------
# VACUUM only when ALL hold: freelist ratio high AND db is large AND ample disk.
FREELIST_RATIO_MAX="${FREELIST_RATIO_MAX:-0.50}"   # >50% of pages free → bloated
DB_SIZE_VACUUM_MIN_MB="${DB_SIZE_VACUUM_MIN_MB:-500}"
DISK_HEADROOM_FACTOR="${DISK_HEADROOM_FACTOR:-2}"  # free disk must be > factor × db size

# Queue hygiene
PENDING_STALE_HOURS="${PENDING_STALE_HOURS:-24}"   # prune pending rows older than this

# Orphan reaping
ORPHAN_PROC_MAX="${ORPHAN_PROC_MAX:-8}"            # >N idle mcp-server.cjs → reap

# Escalation thresholds (require Telegram approval, never auto)
DB_SIZE_ALERT_MB="${DB_SIZE_ALERT_MB:-5000}"       # absolute size that warrants a human look
DISK_FREE_MIN_GB="${DISK_FREE_MIN_GB:-15}"

# --- Approval round-trip -----------------------------------------------------
APPROVAL_EXPIRY_HOURS="${APPROVAL_EXPIRY_HOURS:-24}"
CIRCUIT_BREAKER_FAILS="${CIRCUIT_BREAKER_FAILS:-3}" # consecutive auto-fix fails → stop, escalate

# --- Notifications -----------------------------------------------------------
TELEGRAM_CHANNEL="${TELEGRAM_CHANNEL:-telegram}"
OWNER_FILE="${OWNER_FILE:-$STATE_DIR/owner.json}"  # written by the bridge (self-bootstrapped)
NOTIFY_PREFIX="${NOTIFY_PREFIX:-🐕 claude-mem-watchdog}"
